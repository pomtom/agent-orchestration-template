# Security Scanning Workflow
#
# Comprehensive security checks including code analysis, secrets detection,
# and compliance with security standards.

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          
          # Check for common secret patterns
          echo "Checking for API keys..."
          if grep -rE "(api[_-]?key|apikey|api[_-]?secret)" --include="*.cs" --include="*.json" --include="*.config" --exclude-dir={bin,obj} . | grep -v "IConfiguration" | grep -v "//"; then
            echo "::warning::Potential API keys found in code"
          fi
          
          echo "Checking for connection strings..."
          if grep -rE "(Server=.*Password=|Data Source=.*Password=)" --include="*.cs" --include="*.config" --exclude-dir={bin,obj} .; then
            echo "::error::Hardcoded connection strings found"
            exit 1
          fi
          
          echo "Checking for JWT secrets..."
          if grep -rE "(jwt[_-]?secret|token[_-]?secret)" --include="*.cs" --include="*.json" --exclude-dir={bin,obj} . | grep -v "IConfiguration"; then
            echo "::warning::Potential JWT secrets found"
          fi

  code-analysis:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      
      - name: Restore
        run: dotnet restore
      
      - name: Run security code analysis
        run: |
          echo "Running security-focused analyzers..."
          dotnet build --configuration Release /p:EnableNETAnalyzers=true /p:AnalysisLevel=latest /p:EnforceCodeStyleInBuild=true
      
      - name: Check for SQL injection vulnerabilities
        run: |
          echo "Checking for SQL injection risks..."
          if grep -rE "(ExecuteSqlCommand|FromSqlRaw|FromSqlInterpolated)" --include="*.cs" --exclude-dir={bin,obj} . | grep -v "parameterized"; then
            echo "::warning::Review SQL execution for injection risks"
          fi

  dependency-scan:
    name: Dependency Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      
      - name: Restore packages
        run: dotnet restore
      
      - name: Scan for vulnerable dependencies
        run: |
          echo "Scanning for vulnerable packages..."
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected. Review and update immediately."
            exit 1
          fi
          
          echo "✅ No vulnerable packages detected"

  configuration-security:
    name: Configuration Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check configuration security
        run: |
          echo "Checking configuration files for security issues..."
          
          # Check appsettings.json files
          for file in $(find . -name "appsettings*.json" ! -path "*/bin/*" ! -path "*/obj/*"); do
            echo "Checking $file..."
            
            if grep -qi "password" "$file"; then
              echo "::error::Password found in $file - use User Secrets or Key Vault"
              exit 1
            fi
            
            if grep -qi "connectionstring" "$file" | grep -v "UseDevelopmentStorage=true"; then
              echo "::warning::Connection string in $file - ensure it uses configuration references"
            fi
          done
      
      - name: Verify User Secrets not committed
        run: |
          if [ -f "secrets.json" ] || find . -name "*secrets*.json" ! -path "*/bin/*" ! -path "*/obj/*" | grep -q .; then
            echo "::error::Secrets file found in repository"
            exit 1
          fi

  cors-security:
    name: CORS Configuration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for permissive CORS
        run: |
          echo "Checking CORS configuration..."
          if grep -r "AllowAnyOrigin()" --include="*.cs" --exclude-dir={bin,obj} .; then
            echo "::warning::AllowAnyOrigin() detected - review CORS policy for production"
          fi

  authentication-check:
    name: Authentication Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check authentication configuration
        run: |
          echo "Checking authentication patterns..."
          
          # Check for weak authentication
          if grep -r "Anonymous" --include="*.cs" --exclude-dir={bin,obj} . | grep -v "AllowAnonymous"; then
            echo "::warning::Review anonymous access patterns"
          fi
          
          # Check for JWT configuration
          if grep -r "JwtBearer" --include="*.cs" --exclude-dir={bin,obj} .; then
            echo "Checking JWT configuration..."
            if grep -r "ValidateIssuerSigningKey.*false" --include="*.cs" --exclude-dir={bin,obj} .; then
              echo "::error::JWT signature validation is disabled"
              exit 1
            fi
          fi

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, code-analysis, dependency-scan, configuration-security, cors-security, authentication-check]
    if: always()
    steps:
      - name: Generate security summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security checks completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret detection" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code security analysis" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Configuration security" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CORS policy" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Authentication checks" >> $GITHUB_STEP_SUMMARY
